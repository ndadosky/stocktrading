services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpass}
      POSTGRES_DB: ${POSTGRES_DB:-stocktrading}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stock} -d ${POSTGRES_DB:-stocktrading}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        APP_GIT_COMMIT: ${APP_GIT_COMMIT:-unknown}
        APP_BUILT_AT: ${APP_BUILT_AT:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-stock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpass}
      POSTGRES_DB: ${POSTGRES_DB:-stocktrading}
      HOST: 0.0.0.0
      PORT: 80
      APP_VERSION: ${APP_VERSION:-dev}
      APP_GIT_COMMIT: ${APP_GIT_COMMIT:-unknown}
      APP_BUILT_AT: ${APP_BUILT_AT:-}
      STOCK_STARTING_CAPITAL: ${STOCK_STARTING_CAPITAL:-25000}
      STOCK_IMAGE_PYTHON: ${STOCK_IMAGE_PYTHON:-python3}
      STOCK_REQUIRE_POSTGRES: ${STOCK_REQUIRE_POSTGRES:-true}
      STOCK_SCHEDULER: ${STOCK_SCHEDULER:-internal}
      POOLSYNC_URL: ${POOLSYNC_URL:-}
      POOLSYNC_AUTHORIZATION: ${POOLSYNC_AUTHORIZATION:-}
      POOLSYNC_USER: ${POOLSYNC_USER:-}
      HOME_ASSISTANT_URL: ${HOME_ASSISTANT_URL:-}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}
      HOME_FRONT_DOOR_ENTITY: ${HOME_FRONT_DOOR_ENTITY:-lock.front_front_door}
      HOME_SOLAR_POWER_ENTITY: ${HOME_SOLAR_POWER_ENTITY:-}
      HOME_SOLAR_TODAY_ENTITY: ${HOME_SOLAR_TODAY_ENTITY:-}
      HOME_KIA_BATTERY_ENTITY: ${HOME_KIA_BATTERY_ENTITY:-}
      HOME_KIA_CHARGING_ENTITY: ${HOME_KIA_CHARGING_ENTITY:-}
      HOME_KIA_RANGE_ENTITY: ${HOME_KIA_RANGE_ENTITY:-}
      HOME_VOLVO_BATTERY_ENTITY: ${HOME_VOLVO_BATTERY_ENTITY:-}
      HOME_VOLVO_CHARGING_ENTITY: ${HOME_VOLVO_CHARGING_ENTITY:-}
      HOME_VOLVO_RANGE_ENTITY: ${HOME_VOLVO_RANGE_ENTITY:-}
      HOME_POOL_MAIN_DRAIN_ENTITY: ${HOME_POOL_MAIN_DRAIN_ENTITY:-switch.pool_sonoff_1001e73d82_1}
      HOME_POOL_NO_POOL_JETS_ENTITY: ${HOME_POOL_NO_POOL_JETS_ENTITY:-switch.pool_sonoff_1001e73d82_3}
      HOME_POOL_SPA_UPPER_JETS_ENTITY: ${HOME_POOL_SPA_UPPER_JETS_ENTITY:-switch.pool_sonoff_1001e73d82_4}
      HOME_POOL_DECK_JETS_ENTITY: ${HOME_POOL_DECK_JETS_ENTITY:-switch.pool_sonoff_1001e73d82_2}
      ENPHASE_API_KEY: ${ENPHASE_API_KEY:-}
      ENPHASE_AUTHORIZATION_URL: ${ENPHASE_AUTHORIZATION_URL:-}
      ENPHASE_CLIENT_ID: ${ENPHASE_CLIENT_ID:-}
      ENPHASE_CLIENT_SECRET: ${ENPHASE_CLIENT_SECRET:-}
      ENPHASE_REDIRECT_URI: ${ENPHASE_REDIRECT_URI:-}
      ENPHASE_SYSTEM_ID: ${ENPHASE_SYSTEM_ID:-}
      ENPHASE_CACHE_MINUTES: ${ENPHASE_CACHE_MINUTES:-30}
      EWELINK_DEVICE_ID: ${EWELINK_DEVICE_ID:-}
      EWELINK_MODEL: ${EWELINK_MODEL:-PSF-B04-GL}
      HOME_EWELINK_CHANNEL_1_ENTITY: ${HOME_EWELINK_CHANNEL_1_ENTITY:-}
      HOME_EWELINK_CHANNEL_1_NAME: ${HOME_EWELINK_CHANNEL_1_NAME:-Channel 1}
      HOME_EWELINK_CHANNEL_2_ENTITY: ${HOME_EWELINK_CHANNEL_2_ENTITY:-}
      HOME_EWELINK_CHANNEL_2_NAME: ${HOME_EWELINK_CHANNEL_2_NAME:-Channel 2}
      HOME_EWELINK_CHANNEL_3_ENTITY: ${HOME_EWELINK_CHANNEL_3_ENTITY:-}
      HOME_EWELINK_CHANNEL_3_NAME: ${HOME_EWELINK_CHANNEL_3_NAME:-Channel 3}
      HOME_EWELINK_CHANNEL_4_ENTITY: ${HOME_EWELINK_CHANNEL_4_ENTITY:-}
      HOME_EWELINK_CHANNEL_4_NAME: ${HOME_EWELINK_CHANNEL_4_NAME:-Channel 4}
      TZ: America/New_York
    volumes:
      - ./exports:/app/exports
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  pgdata:
